---
name: Build and Release Binaries
on:
  workflow_dispatch:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  build:
    name: Build Binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: ubuntu-24.04-arm
            platform: linux
          - os: macos-latest
            platform: macos
          - os: macos-15-intel
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
      - name: Checkout source code
        uses: actions/checkout@v7
      - name: Install dependencies
        run: shards install
      - name: Inject slug/short variables
        uses: rlespinasse/github-slug-action@v5
      - name: Set architecture environment variable
        run: |
          if [ "$RUNNER_ARCH" == "X64" ]; then
            echo "ARCH=x86_64" >> $GITHUB_ENV
          elif [ "$RUNNER_ARCH" == "ARM64" ]; then
            echo "ARCH=arm64" >> $GITHUB_ENV
          else
            echo "ARCH=unknown" >> $GITHUB_ENV
          fi
      - if: matrix.platform == 'linux'
        name: Build binary (Linux)
        run: |
          mkdir -p build
          # Use Crystal container to build static binary
          docker run --rm -v $(pwd):/noir -w /noir --entrypoint="" crystallang/crystal:1.20.0-alpine sh -c "
            apk add --no-cache yaml-dev zstd-dev git curl &&
            shards install --production &&
            mkdir -p build &&
            crystal build src/noir.cr -o build/noir-${GITHUB_REF_SLUG}-linux-${ARCH} --release --no-debug --static
          "
      - if: matrix.platform == 'macos'
        name: Install macOS build dependencies
        run: brew install openssl@3 pkg-config
      - if: matrix.platform == 'macos'
        name: Build and package binary (macOS)
        run: |
          mkdir -p build
          OPENSSL_PREFIX="$(brew --prefix openssl@3)"
          export PKG_CONFIG_PATH="${OPENSSL_PREFIX}/lib/pkgconfig"
          BIN="build/noir-${GITHUB_REF_SLUG}-osx-${ARCH}"
          crystal build src/noir.cr -o "$BIN" --no-debug --release
          chmod +x scripts/package-macos.sh
          scripts/package-macos.sh "$BIN" "build/noir-${GITHUB_REF_SLUG}-osx-${ARCH}.tar.gz"
          rm -f "$BIN"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}-${{ env.ARCH }}
          path: build
      - if: startsWith(github.ref, 'refs/tags/')
        name: Upload to GitHub Releases
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
          file: build/*