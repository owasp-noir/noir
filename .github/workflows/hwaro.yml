name: Hwaro on GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/hwaro.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify EN/KO doc parity
        # Every English page needs a Korean counterpart and vice
        # versa — the sidebar / language switcher assume parity, so
        # an unpaired page surfaces as a broken language link. Fails
        # fast before the build runs.
        run: bash docs/scripts/check_doc_parity.sh

      - name: Build and Deploy
        uses: hahwul/hwaro@main
        with:
          build_dir: "docs"
          token: ${{ secrets.GITHUB_TOKEN }}
