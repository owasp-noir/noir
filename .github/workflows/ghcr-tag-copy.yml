---
name: GHCR Tag Copy
# One-shot helper: copy an existing GHCR manifest list to an additional tag
# without rebuilding the image. Useful for backfilling legacy tag conventions
# (e.g. publishing :v0.30.0 alongside :0.30.0 for downstream consumers that
# pinned to the historical v-prefixed tag) or reapplying :latest after an
# accidental overwrite.
on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: Existing tag on ghcr.io/<repo> (e.g. 0.30.0)
        required: true
        type: string
      dest_tag:
        description: Tag to create pointing at the source manifest (e.g. v0.30.0)
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy tag
        run: |
          docker buildx imagetools create \
            --tag "ghcr.io/${{ github.repository }}:${{ inputs.dest_tag }}" \
            "ghcr.io/${{ github.repository }}:${{ inputs.source_tag }}"

      - name: Inspect destination
        run: |
          docker buildx imagetools inspect \
            "ghcr.io/${{ github.repository }}:${{ inputs.dest_tag }}"
