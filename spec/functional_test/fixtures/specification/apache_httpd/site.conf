<VirtualHost *:443>
    ServerName api.example.com

    <Location /v1/users>
        ProxyPass http://users:8080/users
    </Location>
    <LocationMatch "^/admin/.*$">
        AuthType Basic
    </LocationMatch>
    Alias /static /var/www/static
    RewriteRule ^/api/(.*)$ /v1/$1 [L,QSA]
</VirtualHost>
