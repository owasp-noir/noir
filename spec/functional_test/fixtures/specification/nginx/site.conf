server {
    listen 443 ssl;
    server_name api.example.com;

    location /v1/users {
        proxy_pass http://users;
    }

    location ~ ^/admin/.* {
        auth_basic "x";
        proxy_pass http://admin;
    }

    location = /healthz {
        return 200 "ok";
    }

    location /api/ {
        proxy_pass http://api/;
        if ($request_method = POST) {
            return 405;
        }
    }
}
