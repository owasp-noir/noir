apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-route
spec:
  parentRefs:
    - name: example-gateway
  hostnames:
    - api.example.com
  rules:
    - matches:
        - method: GET
          path:
            type: PathPrefix
            value: /v1/users
        - method: POST
          path:
            type: Exact
            value: /v1/users
      backendRefs:
        - name: users
          port: 8080
    - matches:
        - path:
            type: RegularExpression
            value: /v2/.*
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /v1/legacy
