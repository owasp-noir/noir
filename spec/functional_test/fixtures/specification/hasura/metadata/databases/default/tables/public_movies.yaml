table:
  name: movies
  schema: public
object_relationships:
  - name: director
    using:
      foreign_key_constraint_on: director_id
select_permissions:
  - role: public
    permission:
      columns:
        - id
        - title
        - release_year
      filter: {}
insert_permissions:
  - role: user
    permission:
      check: {}
      columns:
        - title
        - release_year
