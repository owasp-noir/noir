swagger: "2.0"
info:
  version: 1.0.0
  title: Pet Store API
  description: Sample API for managing pets in a pet store.
basePath: /v1
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
paths:
  /pets:
    get:
      summary: Get a list of pets
      responses:
        200:
          description: A list of pets
          schema:
            type: array
            items:
              $ref: "#/definitions/Pet"
    post:
      summary: Add a new pet
      parameters:
        - in: body
          name: pet
          required: true
          schema:
            $ref: "#/definitions/NewPet"
      responses:
        201:
          description: Pet added successfully
  /pets/search:
    get:
      summary: Search pets by query parameters
      parameters:
        - name: name
          in: query
          type: string
        - name: X-Request-Id
          in: header
          type: string
      responses:
        200:
          description: Search results
  /pets/upload:
    post:
      summary: Upload pet data using formData
      parameters:
        - name: file
          in: formData
          type: file
        - name: description
          in: formData
          type: string
      responses:
        201:
          description: Upload successful
  /pets/submit:
    post:
      summary: Submit pet data using form (non-standard)
      parameters:
        - name: pet_name
          in: form
          type: string
      responses:
        201:
          description: Submit successful
  /pets/{petId}:
    get:
      summary: Get information about a specific pet
      parameters:
        - name: petId
          in: path
          required: true
          type: integer
      responses:
        200:
          description: Information about the pet
          schema:
            $ref: "#/definitions/Pet"
    put:
      summary: Update information about a specific pet
      parameters:
        - name: petId
          in: path
          required: true
          type: integer
        - in: body
          name: pet
          required: true
          schema:
            $ref: "#/definitions/UpdatePet"
      responses:
        200:
          description: Pet information updated successfully
definitions:
  Pet:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
      breed:
        type: string
  NewPet:
    type: object
    properties:
      name:
        type: string
  UpdatePet:
    type: object
    properties:
      name:
        type: string
      breed:
        type: string