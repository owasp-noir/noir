---
name: OWASP Noir Action
description: Hunt every Endpoint in your code, expose Shadow APIs, map the Attack Surface
branding:
  icon: search
  color: purple
inputs:
  base_path:
    description: The base path to analyze for endpoints (equivalent to -b/--base-path)
    required: true
    default: "."
  url:
    description: Set base url for endpoints (equivalent to -u/--url)
    required: false
    default: ""
  format:
    description: Set output format (plain, yaml, json, jsonl, markdown-table, curl, httpie, oas2, oas3, etc.)
    required: false
    default: "json"
  output_file:
    description: Write result to file (equivalent to -o/--output)
    required: false
    default: ""
  techs:
    description: Specify the technologies to use (equivalent to -t/--techs)
    required: false
    default: ""
  exclude_techs:
    description: Specify the technologies to be excluded (equivalent to --exclude-techs)
    required: false
    default: ""
  passive_scan:
    description: Perform a passive scan for security issues (equivalent to -P/--passive-scan)
    required: false
    default: "false"
  passive_scan_severity:
    description: Set minimum severity level for passive scan (critical, high, medium, low)
    required: false
    default: "high"
  use_all_taggers:
    description: Activates all taggers for full analysis coverage (equivalent to -T/--use-all-taggers)
    required: false
    default: "false"
  use_taggers:
    description: Activates specific taggers (equivalent to --use-taggers)
    required: false
    default: ""
  include_path:
    description: Include file path in the result (equivalent to --include-path)
    required: false
    default: "false"
  verbose:
    description: Show verbose messages (equivalent to --verbose)
    required: false
    default: "false"
  debug:
    description: Show debug messages (equivalent to -d/--debug)
    required: false
    default: "false"
  concurrency:
    description: Set concurrency level (equivalent to --concurrency)
    required: false
    default: ""
  exclude_codes:
    description: Exclude specific HTTP response codes (comma-separated, equivalent to --exclude-codes)
    required: false
    default: ""
  status_codes:
    description: Display HTTP status codes for discovered endpoints (equivalent to --status-codes)
    required: false
    default: "false"
  ai_provider:
    description: Specify AI provider prefix or full custom URL (equivalent to --ai-provider)
    required: false
    default: ""
  ai_model:
    description: Specify AI model name (equivalent to --ai-model)
    required: false
    default: ""
  ai_key:
    description: Specify AI API key (equivalent to --ai-key)
    required: false
    default: ""
  ai_agent:
    description: Enable agentic AI workflow (equivalent to --ai-agent)
    required: false
    default: "false"
  probe:
    description: Fire HTTP requests at discovered endpoints (equivalent to --probe)
    required: false
    default: "false"
  probe_via:
    description: Route probes through this proxy URL (equivalent to --probe-via)
    required: false
    default: ""
  export_es:
    description: Index endpoints in Elasticsearch or OpenSearch (equivalent to --export-es)
    required: false
    default: ""
  export_webhook:
    description: POST endpoint catalog as JSON to a webhook URL (equivalent to --export-webhook)
    required: false
    default: ""
  diff_path:
    description: Old code version path for diff analysis (equivalent to --diff-path)
    required: false
    default: ""
  no_log:
    description: Hide execution progress/diagnostic logs and only show results (equivalent to --no-log)
    required: false
    default: "true"
outputs:
  endpoints:
    description: Full Noir result document (`{"endpoints":[...],"passive_results":[...]}`) when format=json|jsonl. Empty otherwise.
    value: ${{ steps.noir.outputs.endpoints }}
  passive_results:
    description: JSON array of passive-scan findings when format=json|jsonl. `[]` otherwise.
    value: ${{ steps.noir.outputs.passive_results }}
runs:
  using: composite
  steps:
    # Resolve the ghcr.io tag from the ref the user pinned the action
    # to. `@v1.0.0` → `1.0.0`, `@main` → `main`, no ref → `latest`.
    # Mirrors the matching released image so locking the action to a
    # tag locks the runtime too — no more `FROM noir:1.0.0` hardcoded
    # in a sibling Dockerfile that the maintainer must keep bumping.
    - name: Resolve Noir image tag
      id: resolve
      shell: bash
      run: |
        REF="${{ github.action_ref }}"
        TAG="${REF#v}"
        TAG="${TAG:-latest}"
        echo "image=ghcr.io/owasp-noir/noir:${TAG}" >> "$GITHUB_OUTPUT"
        echo "Using Noir image: ghcr.io/owasp-noir/noir:${TAG}"

    # Pull explicitly so the next step's log only shows "running
    # noir", not the registry round-trip. Easier triage for registry
    # vs runtime failures.
    - name: Pull Noir image
      shell: bash
      run: docker pull "${{ steps.resolve.outputs.image }}"

    # Run the entrypoint inside the pre-built image. INPUT_* env vars
    # match the keys exposed via `with:`; the entrypoint reads them in
    # place of the legacy positional argv it used to receive via the
    # `args:` array under `using: docker`.
    #
    # $GITHUB_OUTPUT inside the container points at a workspace path
    # so the runner host can read it back after the container exits —
    # the runner's real $GITHUB_OUTPUT lives outside the container.
    - name: Run Noir
      id: noir
      shell: bash
      run: |
        docker run --rm \
          -v "${{ github.workspace }}":/github/workspace \
          -w /github/workspace \
          -e GITHUB_ACTIONS=true \
          -e GITHUB_REPOSITORY="${{ github.repository }}" \
          -e GITHUB_ACTOR="${{ github.actor }}" \
          -e GITHUB_OUTPUT=/github/workspace/.noir-output \
          -e INPUT_BASE_PATH="${{ inputs.base_path }}" \
          -e INPUT_URL="${{ inputs.url }}" \
          -e INPUT_FORMAT="${{ inputs.format }}" \
          -e INPUT_OUTPUT_FILE="${{ inputs.output_file }}" \
          -e INPUT_TECHS="${{ inputs.techs }}" \
          -e INPUT_EXCLUDE_TECHS="${{ inputs.exclude_techs }}" \
          -e INPUT_PASSIVE_SCAN="${{ inputs.passive_scan }}" \
          -e INPUT_PASSIVE_SCAN_SEVERITY="${{ inputs.passive_scan_severity }}" \
          -e INPUT_USE_ALL_TAGGERS="${{ inputs.use_all_taggers }}" \
          -e INPUT_USE_TAGGERS="${{ inputs.use_taggers }}" \
          -e INPUT_INCLUDE_PATH="${{ inputs.include_path }}" \
          -e INPUT_VERBOSE="${{ inputs.verbose }}" \
          -e INPUT_DEBUG="${{ inputs.debug }}" \
          -e INPUT_CONCURRENCY="${{ inputs.concurrency }}" \
          -e INPUT_EXCLUDE_CODES="${{ inputs.exclude_codes }}" \
          -e INPUT_STATUS_CODES="${{ inputs.status_codes }}" \
          -e INPUT_AI_PROVIDER="${{ inputs.ai_provider }}" \
          -e INPUT_AI_MODEL="${{ inputs.ai_model }}" \
          -e INPUT_AI_KEY="${{ inputs.ai_key }}" \
          -e INPUT_AI_AGENT="${{ inputs.ai_agent }}" \
          -e INPUT_PROBE="${{ inputs.probe }}" \
          -e INPUT_PROBE_VIA="${{ inputs.probe_via }}" \
          -e INPUT_EXPORT_ES="${{ inputs.export_es }}" \
          -e INPUT_EXPORT_WEBHOOK="${{ inputs.export_webhook }}" \
          -e INPUT_DIFF_PATH="${{ inputs.diff_path }}" \
          -e INPUT_NO_LOG="${{ inputs.no_log }}" \
          --entrypoint /entrypoint.sh \
          "${{ steps.resolve.outputs.image }}"

        # The container wrote to /github/workspace/.noir-output (its
        # view of $GITHUB_OUTPUT); promote that into the composite
        # step's real $GITHUB_OUTPUT so the `endpoints` /
        # `passive_results` outputs surface.
        if [ -f "${{ github.workspace }}/.noir-output" ]; then
          cat "${{ github.workspace }}/.noir-output" >> "$GITHUB_OUTPUT"
          rm -f "${{ github.workspace }}/.noir-output"
        fi
