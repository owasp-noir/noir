        </div>
        <script>
        (function(){
          var basePath = new URL('https://owasp-noir.github.io/noir').pathname.replace(/\/+$/, '');
          var path = window.location.pathname;
          var rel = path.substring(basePath.length) || '/';
          var isKo = rel.startsWith('/ko/') || rel === '/ko';
          var switcher = document.getElementById('lang-switcher');
          var links = switcher.querySelectorAll('.lang-link');
          for (var i = 0; i < links.length; i++) {
            var lang = links[i].getAttribute('data-lang');
            if ((lang === 'ko' && isKo) || (lang === 'en' && !isKo)) {
              links[i].classList.add('active');
            }
            if (lang === 'ko') {
              links[i].href = isKo ? path : basePath + '/ko' + rel;
            } else {
              links[i].href = isKo ? basePath + rel.replace(/^\/ko/, '') : path;
            }
          }
        })();
        </script>
