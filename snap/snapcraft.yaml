name: noir
base: core24
version: 1.0.0
summary: OWASP Noir
description: Hunt every Endpoint in your code, expose Shadow APIs, map the Attack Surface.

grade: stable # must be 'stable' to release into candidate/stable channels
confinement: strict # use 'strict' once you have the right plugs and slots
license: MIT

apps:
  noir:
    command: noir
    plugs:
      - home
      - removable-media
      - network
      - network-bind

parts:
  noir:
    source: ./
    plugin: nil #crystal
    #crystal-channel: latest/stable
    override-build: |
      # 1. Secure a prebuilt Crystal compiler locally to bypass sudo apt-get interactive dialogs in virtualization env
      CRYSTAL_VER="1.20.0"
      curl -fsSL "https://github.com/crystal-lang/crystal/releases/download/${CRYSTAL_VER}/crystal-${CRYSTAL_VER}-1-linux-x86_64.tar.gz" -o crystal.tar.gz
      tar -xzf crystal.tar.gz
      export PATH="$(pwd)/crystal-${CRYSTAL_VER}-1/bin:$PATH"
      
      # 2. Shards install production dependencies
      shards install --production
      
      # 3. Create a linker wrapper to append -lstdc++ at the very end of the cc linking stage.
      # This is required to resolve transitive C++ symbols from static libicuuc.a due to strict linker ordering.
      echo '#!/bin/sh' > cc-wrapper
      echo 'exec cc "$@" -lstdc++' >> cc-wrapper
      chmod +x cc-wrapper
      
      # 4. Compile high-portability static binary to preempt downstream client libyaml/libzstd dynamic library crashes
      CC="$(pwd)/cc-wrapper" shards build --release --no-debug --production --static
      cp ./bin/noir $CRAFT_PART_INSTALL/
    build-packages:
      - git
      - curl
      - libssl-dev
      - libxml2-dev
      - libz-dev
      - libyaml-dev
      - libpcre2-dev
      - libevent-dev
      - libgmp-dev
      - libzstd-dev
      - pkg-config
      - libgc-dev
      - liblzma-dev
      - libicu-dev
    stage-packages:
      - libssl3
      - libxml2
      - libevent-2.1-7t64
