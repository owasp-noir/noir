# =============================================================================
# OWASP Noir Documentation - Hwaro Configuration
# =============================================================================

title = "OWASP Noir"
description = "Attack surface detector that identifies endpoints by static analysis."
base_url = "https://owasp-noir.github.io/noir"

# =============================================================================
# Multilingual
# =============================================================================

default_language = "en"

[languages.en]
language_name = "English"
weight = 1

[languages.ko]
language_name = "한국어"
weight = 2

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

# =============================================================================
# OpenGraph & Twitter Cards
# =============================================================================

[og]
default_image = "/images/noir-wallpaper.jpg"
type = "article"
twitter_card = "summary_large_image"

# =============================================================================
# Search Configuration
# =============================================================================

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = false
per_page = 10

# =============================================================================
# SEO: Sitemap
# =============================================================================

[sitemap]
enabled = true
filename = "sitemap.xml"
exclude = []

# =============================================================================
# SEO: Robots.txt
# =============================================================================

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = [] }
]

# =============================================================================
# SEO: LLMs.txt
# =============================================================================

[llms]
enabled = true
filename = "llms.txt"
instructions = "OWASP Noir documentation."
full_enabled = true
full_filename = "llms-full.txt"

# =============================================================================
# RSS/Atom Feeds
# =============================================================================

[feeds]
enabled = false

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = true

# =============================================================================
# PWA (Progressive Web App) (Optional)
# =============================================================================
# Generate manifest.json and service worker for offline access

[pwa]
enabled = true
name = "OWASP Noir"
short_name = "Noir"
theme_color = "#1a1a2e"
background_color = "#1a1a2e"
display = "standalone"
start_url = "/"

# =============================================================================
# AMP (Accelerated Mobile Pages) (Optional)
# =============================================================================
# Generate AMP-compliant versions of content pages

# [amp]
# enabled = true
# path_prefix = "amp"
# sections = ["posts"]

# =============================================================================
# Series (Optional)
# =============================================================================
# Group posts into ordered series

# [series]
# enabled = true

# =============================================================================
# Related Posts (Optional)
# =============================================================================
# Recommend related content based on shared taxonomy terms

# [related]
# enabled = true
# limit = 5
# taxonomies = ["tags"]

# =============================================================================
# Asset Pipeline (Optional)
# =============================================================================

[assets]
enabled = true
minify = true
fingerprint = true

# =============================================================================
# Deployment (Optional)
# =============================================================================

# [deployment]
# target = "prod"
# source_dir = "public"
#
# [[deployment.targets]]
# name = "prod"
# url = "file://./out"

# =============================================================================
# Auto OG Images (Optional)
# =============================================================================
# Auto-generate Open Graph preview images for social sharing

[og.auto_image]
enabled = true
background = "#1a1a2e"
text_color = "#ffffff"
accent_color = "#e94560"
font_size = 48
logo = "static/images/logo-s.png"
output_dir = "og-images"
