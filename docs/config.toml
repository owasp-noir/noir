# =============================================================================
# OWASP Noir Documentation - Hwaro Configuration
# =============================================================================

title = "OWASP Noir"
description = "Hunt every endpoint in your code. Noir statically analyses source across 23 languages and 144 frameworks, exposing shadow APIs and mapping the attack surface."
base_url = "https://owasp-noir.github.io/noir"

# =============================================================================
# Multilingual
# =============================================================================
# Every page must exist in both languages. scripts/check_doc_parity.sh enforces
# it in CI, because the language switcher would otherwise point at a 404.

default_language = "en"

[languages.en]
language_name = "English"
weight = 1

[languages.ko]
language_name = "한국어"
weight = 2

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================
# use_cdn = false keeps highlight.js self-hosted (static/assets/js/highlight.min.js),
# which removes the only CDN dependency for code. The theme is irrelevant:
# style.css overrides every .hljs-* token with the monochrome palette.

[highlight]
enabled = true
mode = "client"
use_cdn = false
theme = "atom-one-dark"

# =============================================================================
# OpenGraph & Twitter Cards
# =============================================================================

[og]
default_image = "/images/noir-wallpaper.jpg"
type = "article"
twitter_card = "summary_large_image"

[og.auto_image]
enabled = true
background = "#0b0b0c"
text_color = "#f2f1ef"
accent_color = "#ee2a22"
font_size = 48
logo = "static/images/logo-s.png"
output_dir = "og-images"
show_title = true
style = "diagonal"
pattern_opacity = 0.15
pattern_scale = 1.0
format = "png"

# =============================================================================
# Search
# =============================================================================

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

# =============================================================================
# Pagination
# =============================================================================

[pagination]
enabled = false
per_page = 10

# =============================================================================
# Taxonomies
# =============================================================================
# `authors` powers the blog per-author profile pages at /authors/<slug>/.
# Profile metadata lives in data/authors.yaml; post front matter references
# authors by their registry key.

[[taxonomies]]
name = "authors"
feed = true

# =============================================================================
# SEO
# =============================================================================

[sitemap]
enabled = true
filename = "sitemap.xml"
exclude = []

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = [] }
]

[llms]
enabled = true
filename = "llms.txt"
instructions = "OWASP Noir documentation."
full_enabled = true
full_filename = "llms-full.txt"

# =============================================================================
# RSS Feeds
# =============================================================================

[feeds]
enabled = true
type = "rss"
sections = ["blog"]
limit = 20
full_content = true
default_language_only = true  # /rss.xml is EN; KO gets /ko/rss.xml

# =============================================================================
# Markdown
# =============================================================================

[markdown]
safe = false
lazy_loading = true
emoji = false
task_lists = true
definition_lists = true
footnotes = true

# =============================================================================
# PWA
# =============================================================================

[pwa]
enabled = true
name = "OWASP Noir"
short_name = "Noir"
theme_color = "#0b0b0c"
background_color = "#0b0b0c"
display = "standalone"
start_url = "/"

# =============================================================================
# Asset Pipeline
# =============================================================================

[assets]
enabled = true
minify = true
fingerprint = true
