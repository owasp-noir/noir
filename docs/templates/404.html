{% include "header.html" %}
{% include "partials/nav.html" %}
{% include "partials/search.html" %}
<div class="docs-container" style="grid-template-columns: minmax(0, 1fr);">
  <main id="main" class="docs-main" style="padding-block: clamp(5rem, 14vh, 9rem);">
    <h1 class="docs-title">{{ "notfound.title" | t }}</h1>
    <p class="docs-lede">{{ "notfound.body" | t }}</p>
    <div class="hero-actions" style="margin-top: 2rem;">
      <a class="btn btn-primary" href="{{ base_url }}{{ lang_prefix }}/">
        {{ "notfound.back_home" | t }}
        <svg class="ic" aria-hidden="true"><use href="#i-arrow-right"/></svg>
      </a>
      <a class="btn btn-outline" href="{{ base_url }}{{ lang_prefix }}/get_started/overview/">{{ "notfound.read_docs" | t }}</a>
    </div>
  </main>
</div>
{% include "partials/site-footer.html" %}
{% include "partials/scripts.html" %}
</body>
</html>
