{# Hak, the mascot. `mood` maps to the artwork filenames in static/images/mascot. #}
<figure class="mascot-note">
  <img src="{{ base_url }}/images/mascot/hak-{{ mood | default("hi") }}.webp"
       alt="Hak, the OWASP Noir mascot" width="512" height="512" loading="lazy" decoding="async">
  <figcaption>{{ body | markdownify }}</figcaption>
</figure>
